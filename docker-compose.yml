services:
  postgres:
    image: postgres:14.23-alpine3.24
    environment:

      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: job_scraping
    container_name: postgres
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: always
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_scraping"]
      interval: 5s
      timeout: 5s
      retries: 5

  main-service:
    build:
      context: ./main-service
      dockerfile: Dockerfile
      target: builder
    env_file: ./main-service/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    container_name: main-service
    volumes:
      - ./main-service:/usr/src/app
    command: sh -c "npx prisma migrate deploy && npm run start:docker:dev"
    restart: always
    ports:
      - 4000:4000
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres-data:
  